<!DOCTYPE html>
<html lang="PT-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mesclagem de células em tabelas</title>

    <style>
        body{
            font-family: Arial, Helvetica, sans-serif;
        }

        table {
            width: 200px;
            height: 100px;
            border-collapse: collapse;
        }

        td {
            border: 1px solid black;
            text-align: center;
            vertical-align: middle;
            padding: 8px;
        }

        #B1 {
            background-color: violet;

        }
        
        #D2 {
            background-color: yellow;
        }

        #I3 {
            background-color: aqua;
        }

        #O4 {
            background-color: lightcoral;
        }
    </style>
</head>
<body>
    <h1>Mesclagem de Células</h1>
    <table>
        <tr>
            <td>A</td>
            <td colspan="2" id="B1">B</td>
            <td rowspan="2" id="D2">D</td>
        </tr>
    
        <tr>
            <td>E</td>
            <td>F</td>
            <td>G</td>
        </tr>

        <tr>
            <td rowspan="3" id="I3">I</td>
            <td>J</td>
            <td>K</td>
            <td>L</td>
        </tr>

        <tr>
            <td colspan="2" id="O4">O</td>
            <td>P</td>
        </tr>

        <tr>
            <td>R</td>
            <td>S</td>
            <td>T</td>
        </tr>
    </table>
</body>
</html>
