<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fontes Externas</title>

    <style>
        
        @font-face {
            font-family: 'BlackWizard';
            src: url(Fonts/BlackWizard_PERSONAL_USE_ONLY.otf) format(opentype);
            font-weight: normal;
            font-style: normal;

            /* Tipos de Format:
            - opentype (otf);
            - truetype (ttf);
            - embedded-opentype;
            - truetype-aat;
            - svg;

            */

        }
            
        body {
            font-family: 'BlackWizard';
        }

        h1 {
            font-family: 'BlackWizard';
        }

        p {
            font-family: Arial, Helvetica, sans-serif;
        }
    </style>
</head>

    <body>
        <h1>Olá, Mundo!</h1>
        <p>Lorem ipsum dolor sit amet consectetur adipisicing elit. Odit, quisquam et excepturi quidem ipsum sunt autem illo? Earum dolor impedit dolorum illo soluta voluptates minus quaerat excepturi, est, ex non!</p>
    </body>
</html>
