<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vídeos com HTML5</title>
</head>
<body>
    <h1>Inserindo vídeos hospedados localmente</h1>
    <p>O vídeo está hospeado em meu próprio servidor</p>

    <video width="500" poster="imagens/thumb-ex012-cursoemvideo.png" controls>
        <source src="midia/video-mar-site.mp4" type="video/mp4">
        <source src="midia/video-mar-site.mkv" type="video/mkv">
        <source src="midia/video-mar-site.webm" type="video/webm">
        <p>O seu navegador não tem compatibilidade com reprodução de vídeos.</p>
    </video>

    <h1>Inserindo vídeos do YouTube</h1>
    <iframe width="560" height="315" src="https://www.youtube.com/embed/OzUnqQk4eOg?si=36cJ4JP43Z36pz2e" title="YouTube video player" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" referrerpolicy="strict-origin-when-cross-origin" allowfullscreen></iframe>
</body>
</html>
