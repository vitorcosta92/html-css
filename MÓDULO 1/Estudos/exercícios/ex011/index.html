<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mídias em HTML5</title>
</head>
<body>
    <h1>Imagem Dinâmica</h1>
    <p>Tente abrir esse site em vários dispositivos diferentes ou simplesmente aumente o tamanho do seu navegador.
    </p>

    <picture>
        <source media="(max-width: 750px)" srcset="imagens/foto-p.png" type="image/png">
        <source media="(max-width: 1050px)" srcset="imagens/foto-m.png" type="image/png"> <!--Se por acaso o navegador tiver menos de 1000px, vai carregar a foto média. Sempre bom deixar uma gordurinha a mais-->
        <img src="Imagens/foto-g.png" alt="Imagem Flexível"> <!--Por padrão, carrega a imagem grande-->
    </picture>

    <h1>Reproduzindo Aúdio</h1>
    <p>Vamos aprender a reproduzir áudios em HTML5</p>

    <audio preload="metadata" autoplay controls>
        <source src="midia/Hustlin' (Instrumental) - NEFFEX.mp3" type="audio/mpeg">
        <p>Infelizmente, o seu navegador não consegue reproduzir áudio, <a href="midia/Hustlin' (Instrumental) - NEFFEX.mp3">clique aqui para reproduzir</a>.</p>
    </audio>
</body>
</html>
