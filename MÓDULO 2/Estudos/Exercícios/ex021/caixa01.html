<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modelo de Caixas</title>
    <style>
        h1 {
            background-color: lightblue;
            height: 300px;
            width: 300px;

            border: 10px solid darkgoldenrod;

            padding: 20px 20px 20px 20px;

            margin: 20px 20px 30px 20px;

            outline: 5px dashed salmon;

        }

        a {

            border: 10px solid red;

            padding: 10px;

        }
    </style>
</head>
<body>
    <h1>Exemplo de Caixa box-level</h1>
    <p>Parágrafos também são exemplos de box-level,<a href="#"> mas os links são exemplos de caixas inline-level.</a>Vamos ver como tudo isso funciona! </p>
</body>
</html>
