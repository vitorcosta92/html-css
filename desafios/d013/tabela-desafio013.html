<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Desafio 13 - Tabelas Mescladas (Parte 1)</title>

    <style>
        body{
            font-family: Arial, Helvetica, sans-serif;
        }

        table {
            width: 200px;
            height: 100px;
            border-collapse: collapse;
        }

        td {
            border: 1px solid black;
            text-align: center;
            vertical-align: middle;
        }

        #A1 {
            background-color: aqua;
        }

        #B2 {
            background-color: yellow;
        }

        #C3 {
            background-color: violet;
        }

        #D4 {
            background-color: pink;
        }
    </style>
</head>
<body>
    <h1>Desafio 13 - Parte 1 </h1>
    <table>
        <tr>
            <td>1</td>
            <td>2</td>
            <td rowspan="2" id="A1">3</td>
            <td>4</td>
        </tr>

        <tr>
            <td>5</td>
            <td>6</td>
            <td>7</td>
        </tr>

        <tr>
            <td colspan="3" id="B2">8</td>
            <td>9</td>
        </tr>

        <tr>
            <td rowspan="2" id="C3">10</td>
            <td colspan="2" id="D4">11</td>
            <td>12</td>
        </tr>

        <tr>
            
            <td>13</td>
            <td>14</td>
            <td>15</td>
        </tr>    
    </table>
</body>
</html>
