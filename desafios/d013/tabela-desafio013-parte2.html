<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Desafio 13 - Tabelas Mescladas (Parte 2)</title>

    <style>
        body {
            font-family: Arial, Helvetica, sans-serif;
        }

        table {
            width: 300px;
            height: 100px;
            border-collapse: collapse;
        }

        td {
            border: 1px solid black;
            text-align: center;
            vertical-align: middle;
        }

        #A1 {
            background-color: yellow;
        }

        #B2 {
            background-color: red;
        }

        #C3 {
            background-color: lightskyblue;
        }

        #N4 {
            background-color: violet;
        }
    </style>
</head>
<body>
    <h1>Desafio 13 - Parte 2</h1>

    <table>
        <tr>
            <td colspan="4" id="A1">A</td>
            <td rowspan="4" id="B2">B</td>
        </tr>

        <tr>
            <td rowspan="4" id="C3">C</td>
            <td>D</td>
            <td>E</td>
            <td>F</td>
        </tr>

        <tr>
            <td>G</td>
            <td>H</td>
            <td>I</td>
        </tr>

        <tr>
            <td>J</td>
            <td>L</td>
            <td>M</td>
        </tr>

        <tr>
            <td colspan="4" id="N4">N</td>
        </tr>

    </table>

    
</body>
</html>
