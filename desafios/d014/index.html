<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width='device-width', initial-scale=1.0">
    <title>Boletim Escolar</title>

    <style>
        body {
            font-family: Arial, Helvetica, sans-serif;
        }

        table {
            width: 500px;
            height: 100px;
            border-collapse: collapse;
            margin: auto;
        }

        caption {
            font-size: 1em;
            font-weight: bold;
            background-color: darkgoldenrod;
            padding: 10px;
        }

        thead {
            background-color: lightgray;
        }

        td, th {
            border: 2px solid black;
            text-align: center;
            vertical-align: middle;
            padding: 10px;
        }

        #exatas {
            background-color: lightgray;
        }

        #media1 {
            background-color: lightgray;
        }

        #humanas {
            background-color: lightgray;
        }

        #media2 {
            background-color: lightgray;
        }
    </style>
</head>
<body>
    <h1>Boletim Escolar</h1>

    <table>
        <caption>
            Boletim Escolar 2ºAno do Ensino Médio
        </caption>

        <thead>
            <tr>
                <th rowspan="2">ÁREA</th>
                <th rowspan="2">DISCIPLINAS</th>
                <th scope="colgroup" colspan="2">NOTAS</th>
                <th rowspan="2">MÉDIA</th>
            </tr>

            <tr>
                <th>NOTA 1</th>
                <th>NOTA 2</th>
            </tr>
        </thead>

        <tbody>
            <tr>
                <th scope="rowgroup" rowspan="4" id="exatas">EXATAS</th>
                <td>Matemática</td>
                <td>0.0</td>
                <td>0.0</td>
                <td>0.0</td>
            </tr>

            <tr>
                <td>Física</td>
                <td>0.0</td>
                <td>0.0</td>
                <td>0.0</td>
            </tr>

            <tr>
                <td>Química</td>
                <td>0.0</td>
                <td>0.0</td>
                <td>0.0</td>
            </tr>

            <tr>
                <td>Biologia</td>
                <td>0.0</td>
                <td>0.0</td>
                <td>0.0</td>
            </tr>

            <tr>
                <th colspan="4" id="media1">MÉDIA EXATAS</th>
                <td>0.0</td>
            </tr>

            <tr>
                <th scope="rowgroup" rowspan="3" id="humanas">HUMANAS</th>
                <td>Português</td>
                <td>0.0</td>
                <td>0.0</td>
                <td>0.0</td>
            </tr>

            <tr>
                <td>História</td>
                <td>0.0</td>
                <td>0.0</td>
                <td>0.0</td>
            </tr>

            <tr>
                <td>Geografia</td>
                <td>0.0</td>
                <td>0.0</td>
                <td>0.0</td>
            </tr>

            <tr>
                <th colspan="4" id="media2">MÉDIA HUMANAS</th>
                <td>0.0</td>
            </tr>
        </tbody>
    </table>
</body>
</html>
